<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3333"/>
      <stop offset="1" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="96" height="96" rx="20" fill="url(#bg)"/>

  <!-- 2x2 のサムネイル（グリッド） -->
  <g fill="#fff" filter="url(#sh)">
    <rect x="18" y="18" width="26" height="18" rx="4"/>
    <rect x="52" y="18" width="26" height="18" rx="4"/>
    <rect x="18" y="42" width="26" height="18" rx="4"/>
    <rect x="52" y="42" width="26" height="18" rx="4"/>
    <!-- 下段の見出し行（表示件数が続くイメージ） -->
    <rect x="18" y="66" width="26" height="6" rx="3" opacity="0.55"/>
    <rect x="52" y="66" width="26" height="6" rx="3" opacity="0.55"/>
    <rect x="18" y="76" width="16" height="6" rx="3" opacity="0.35"/>
    <rect x="52" y="76" width="16" height="6" rx="3" opacity="0.35"/>
  </g>

  <!-- 中央の再生ボタン（YouTube らしさ） -->
  <g filter="url(#sh)">
    <circle cx="48" cy="39" r="14" fill="#cc0000"/>
    <circle cx="48" cy="39" r="14" fill="none" stroke="#fff" stroke-width="2.5"/>
    <path d="M43 32.5 L57 39 L43 45.5 Z" fill="#fff"/>
  </g>
</svg>
