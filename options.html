<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Grid Customizer 設定</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #c00;
      }
      html {
        min-width: 460px;
      }
      body {
        font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic",
          Meiryo, sans-serif;
        box-sizing: border-box;
        width: min(640px, 100vw);
        min-width: 460px;
        margin: 0;
        padding: 24px;
        max-width: 640px;
        line-height: 1.6;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      .sub {
        color: #888;
        font-size: 13px;
        margin: 0 0 24px;
      }
      .field {
        margin-bottom: 22px;
      }
      label.title {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .hint {
        font-size: 12px;
        color: #888;
        margin: 4px 0 8px;
      }
      input[type="number"] {
        width: 80px;
        padding: 6px 8px;
        font-size: 15px;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        min-height: 140px;
        padding: 8px;
        font-size: 14px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checks label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 10px 20px;
        font-size: 15px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
      #status {
        margin-left: 12px;
        color: #2e7d32;
        font-size: 14px;
      }
      hr {
        border: none;
        border-top: 1px solid #ddd;
        margin: 24px 0;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Grid Customizer</h1>
    <p class="sub">YouTube の一覧表示をカスタマイズします。</p>

    <div class="field checks">
      <label>
        <input type="checkbox" id="enabled" />
        拡張機能を有効にする
      </label>
    </div>

    <hr />

    <div class="field">
      <label class="title" for="itemsPerRow">グリッドの列数（表示件数を増やす）</label>
      <p class="hint">
        トップページ・登録チャンネル一覧などで 1 行に並べる動画の数。数を増やすと 1
        画面あたりの表示件数が増えます（推奨: 4〜6）。
      </p>
      <div class="row">
        <input type="number" id="itemsPerRow" min="1" max="12" />
        <span>列</span>
      </div>
    </div>

    <div class="field">
      <label class="title" for="searchColumns">検索結果の列数</label>
      <p class="hint">
        検索結果をグリッド表示にして 1 画面の表示件数を増やします。1
        にすると通常のリスト表示に戻ります（推奨: 2）。
      </p>
      <div class="row">
        <input type="number" id="searchColumns" min="1" max="8" />
        <span>列</span>
      </div>
    </div>

    <hr />

    <div class="field">
      <label class="title" for="blockTitleKeywords">非表示にするキーワード（タイトル）</label>
      <p class="hint">
        <strong>タイトル</strong>にこれらの文字を含む動画を非表示にします。1
        行に 1 キーワード（部分一致）。
      </p>
      <textarea
        id="blockTitleKeywords"
        placeholder="例:&#10;切り抜き&#10;ライブ&#10;shorts"
      ></textarea>
    </div>

    <div class="field">
      <label class="title" for="blockChannelKeywords">非表示にするキーワード（チャンネル名）</label>
      <p class="hint">
        <strong>チャンネル名</strong>にこれらの文字を含む動画を非表示にします。1
        行に 1 キーワード（部分一致）。
      </p>
      <textarea
        id="blockChannelKeywords"
        placeholder="例:&#10;公式チャンネル&#10;Topic"
      ></textarea>
      <div class="checks" style="margin-top: 8px">
        <label>
          <input type="checkbox" id="caseSensitive" />
          大文字・小文字を区別する
        </label>
        <label>
          <input type="checkbox" id="hideShorts" />
          ショート動画のセクションを非表示にする
        </label>
      </div>
    </div>

    <div class="row">
      <button id="save">保存</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
